---
# pre_k8s_configure.yml
# Run this BEFORE installing Kubernetes.
# Disables the host firewall and configures Docker for the local registry.

- name: Pre-Kubernetes node configuration
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Disable UFW firewall
      ufw:
        state: disabled

    - name: Ensure Docker is installed
      apt:
        name:
          - docker.io
          - docker-compose
        state: present
        update_cache: yes

    - name: Configure Docker daemon
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "insecure-registries": ["registry.kube-system.svc.cluster.local:5000"],
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "100m",
              "max-file": "3"
            }
          }

    - name: Restart Docker to apply config
      systemd:
        name: docker
        state: restarted
        enabled: true

    - name: Add cc user to docker group
      user:
        name: cc
        groups: docker
        append: yes

    - name: Disable swap (required for Kubernetes)
      command: swapoff -a

    - name: Remove swap from fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s+.*)$'
        replace: '# \1'
